<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SL Card Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@200..900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="card-list.css" />
</head>

<body>
    <header>
        <nav class="navbar navbar-dark" style="background-color: #003153;">
            <div class="container-fluid justify-content-center">
                <span class="navbar-brand fs-3 text-white mb-0">
                    <i class="fa-solid fa-list-ul me-2"></i>
                    SL Card Summary
                </span>
            </div>
        </nav>
    </header>

    <div class="container mt-5">
        <div class="dashboard-card p-4 bg-white rounded shadow">
            <h3 class="mb-4" style="color: #003153;">Registered Cards</h3>

            <div class="table-responsive">
                <table class="table table-hover">
                    <thead class="table-dark" style="background-color: #003153;">
                        <tr>
                            <th>Card ID</th>
                            <th class="hide-on-mobile">Start Date</th>
                            <th class="hide-on-mobile">End Date</th>
                            <th>Plan Type</th>
                        </tr>
                    </thead>
                    <tbody id="dashboardTableBody">
                    </tbody>
                </table>
            </div>

            <button class="btn btn-primary w-100 mt-3" id="loadMoreBtn"
                style="background-color: #0072ce; border: none;">
                Show More
            </button>
        </div>
    </div>

    <footer class="text-center mt-5">
        <div class="p-4 text-secondary">
            © 2026 SL Dashboard Service by Hanikristiansson & Mikaela Duran.
        </div>
    </footer>

    <script src="card-list.js"></script>
</body>

</html>
