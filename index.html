<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Card Registration</title>

    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@200..900&display=swap" rel="stylesheet" />
</head>

<body>
    <!-- Header -->
    <header>
        <nav class="navbar navbar-color" data-bs-theme="light">
            <div class="container-fluid justify-content-center">
                <span class="navbar-brand fs-3 text-white mb-0">
                    <i class="fa-regular fa-credit-card me-2"></i>
                    Card Registration
                </span>
            </div>
        </nav>
    </header>
    <br>
    <br>

    <!-- Form section -->
    <div class="container mt-5">
        <div class="form-wrapper">
            <h3 class="mb-4">Enter Card Details</h3>

            <!-- Fake Card -->
            <div class="fake-card mb-4">
                <br><br>
                <div class="card-number" id="cardPreviewNumber">
                    XXXX XXXX XXXX XXXX
                </div>

                <div class="card-bottom">
                    <span class="card-valid" id="cardDate">DATE</span>
                </div>
            </div>

            <!-- Form -->
            <form class="form-card" id="cardForm">
                <div class="mb-3">
                    <label for="cardNumber" class="form-label">Card Number</label>
                    <input type="text" class="form-control" id="cardNumber" placeholder="1234 5678 9012 3456"
                        maxlength="19" />
                </div>

                <div class="mb-3">
                    <label for="periodSelect" class="form-label">Select Period</label>
                    <select id="periodSelect" class="form-select">
                        <option value="">Choose period</option>
                        <option value="DAYS_7">7 days</option>
                        <option value="DAYS_30">30 days</option>
                        <option value="DAYS_90">90 days</option>
                        <option value="DAYS_365">365 days</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label for="firstName" class="form-label">First Name</label>
                    <input type="text" class="form-control" id="firstName" placeholder="First Name" maxlength="19" />
                </div>

                <div class="mb-3">
                    <label for="lastName" class="form-label">Last Name</label>
                    <input type="text" class="form-control" id="lastName" placeholder="Last Name" maxlength="19" />
                </div>

                <div class="mt-3">
                    <label class="form-label">Selected Date</label>
                    <p id="dateResult" class="text-dark mb-0"></p>
                </div>

                <div class="mt-4">
                    <button type="submit" class="btn btn-dark">Submit</button>
                </div>

                <div class="mt-3">
                    <p id="statusMessage" class="mb-0"></p>
                </div>
            </form>
        </div>
    </div>

    <!-- Footer -->
    <footer class="text-center mt-5">
        <div class="container p-4 pb-0">
            <h2 class="text-secondary">Card Registration</h2>
            <p class="text-secondary text-center">
                This card registration page was created by <br />
                Hani & Mikaela <br />
                as part of our technical specialization course
            </p>
        </div>

        <div class="text-center p-3 text-secondary">
            © 2026 Copyright
        </div>
    </footer>

    <script src="script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
